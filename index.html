<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼词推箱子 | 高考词汇挑战 | 修仙段位系统</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #c8e6b5 0%, #8bc34a 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', 'Poppins', 'Comic Neue', sans-serif; margin: 0; padding: 16px; }
        .game-container { background: #fff8e7; border-radius: 56px; box-shadow: 0 20px 35px rgba(0, 0, 0, 0.25), 0 0 0 10px #aed581, 0 0 0 15px #66bb6a; padding: 20px 18px 24px 18px; max-width: 650px; margin: 0 auto; width: 100%; position: relative; }
        .canvas-area { display: flex; justify-content: center; margin-bottom: 18px; background: #f5e6c8; border-radius: 42px; padding: 14px; box-shadow: inset 0 2px 6px rgba(98,57,19,0.1), 0 10px 20px rgba(0,0,0,0.1); }
        canvas { display: block; margin: 0 auto; border-radius: 24px; box-shadow: 0 6px 14px rgba(0,0,0,0.2); background-color: #fff0d4; width: 100%; height: auto; }
        .info-panel { display: flex; justify-content: space-between; align-items: center; background: #fff2df; padding: 12px 18px; border-radius: 60px; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; box-shadow: inset 0 1px 4px #ffe0aa, 0 8px 12px rgba(0,0,0,0.1); }
        .level-box { background: #ff8c42; padding: 6px 16px; border-radius: 40px; color: white; font-weight: bold; font-size: 1rem; white-space: nowrap; }
        .word-hint { background: #5c9e5e; padding: 6px 16px; border-radius: 40px; color: white; font-weight: bold; font-size: 1rem; text-align: center; flex: 1; box-shadow: 0 4px 0 #2d6a2d; letter-spacing: 1px; }
        .timer-box { background: #7bc8a4; padding: 6px 12px; border-radius: 40px; color: #2c4a2e; font-weight: bold; font-size: 0.9rem; font-family: monospace; white-space: nowrap; }
        .rank-area { background: #ffe0a3; border-radius: 50px; padding: 6px 16px; font-weight: bold; font-size: 0.85rem; color: #b45f1b; text-align: center; margin-bottom: 12px; }
        .nickname-bar { display: flex; justify-content: space-between; align-items: center; background: #f7efda; border-radius: 50px; padding: 6px 12px; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
        .nickname-input { flex: 2; padding: 8px 12px; border-radius: 40px; border: none; background: #fff6e8; font-size: 0.85rem; outline: none; }
        .nickname-btn, .rank-toggle-btn, .settings-btn { background: #ffb347; border: none; padding: 6px 14px; border-radius: 40px; font-weight: bold; color: white; cursor: pointer; box-shadow: 0 3px 0 #b4621a; transition: 0.05s linear; font-size: 0.8rem; }
        .settings-btn { background: #6c5ce7; box-shadow: 0 3px 0 #4a3a9e; }
        .button-group { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
        .candy-btn { background: #ffb347; border: none; font-size: 0.9rem; font-weight: bold; padding: 10px 18px; border-radius: 50px; color: white; cursor: pointer; transition: 0.05s linear; box-shadow: 0 5px 0 #b4621a; min-width: 80px; }
        .candy-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b4621a; }
        .candy-btn.reset-btn { background: #ff8c69; box-shadow: 0 5px 0 #c0421a; }
        .candy-btn.next-btn { background: #5fad56; box-shadow: 0 5px 0 #2f6b2f; }
        .candy-btn.prev-btn { background: #f2c94c; box-shadow: 0 5px 0 #b47c2e; color: #5a3a1a; }
        .direction-panel { background: #f7efda; border-radius: 80px; padding: 14px 20px; margin-top: 8px; box-shadow: inset 0 1px 5px #fff5e6, 0 6px 12px rgba(0,0,0,0.12); }
        .dpad { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .dpad-row { display: flex; justify-content: center; gap: 20px; }
        .dir-btn { background: #ffcf9a; border: none; width: 70px; height: 70px; border-radius: 60px; font-size: 2rem; font-weight: bold; color: #a5562c; box-shadow: 0 7px 0 #b97f48; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; background: linear-gradient(145deg, #ffe0b5, #ffcd94); }
        .dir-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 #b97f48; }
        .rank-panel, .settings-panel { margin-top: 20px; background: #fff2df; border-radius: 48px; padding: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border: 2px solid #ffcf9a; }
        .rank-tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; }
        .tab-btn { background: #ffcf9a; border: none; padding: 6px 14px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .tab-btn.active { background: #ff8c42; color: white; }
        .rank-content { max-height: 300px; overflow-y: auto; background: #fff9ef; border-radius: 32px; padding: 8px; }
        .rank-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .rank-table th, .rank-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #ffe0b5; }
        .close-btn { display: block; margin: 12px auto 0; background: #b0a07c; color: white; border: none; padding: 6px 20px; border-radius: 30px; cursor: pointer; }
        .settings-option { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid #ffe0b5; }
        .settings-option span { font-weight: bold; color: #5a3a1a; }
        .toggle-switch { width: 50px; height: 26px; background: #ccc; border-radius: 30px; position: relative; cursor: pointer; transition: 0.2s; }
        .toggle-switch.active { background: #5fad56; }
        .toggle-switch::after { content: ""; width: 22px; height: 22px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.2s; }
        .toggle-switch.active::after { left: 25px; }
        .bgm-upload { margin-top: 12px; text-align: center; }
        .bgm-upload input { width: 100%; padding: 6px; border-radius: 30px; border: 1px solid #ffcf9a; background: #fff6e8; }
        footer { text-align: center; margin-top: 16px; font-size: 0.65rem; color: #5a8f3c; }
        @media (max-width: 550px) {
            .dir-btn { width: 60px; height: 60px; font-size: 1.6rem; }
            .candy-btn { padding: 7px 12px; font-size: 0.8rem; min-width: 70px; }
            .nickname-input { font-size: 0.75rem; padding: 6px 10px; }
            .timer-box, .level-box, .word-hint { font-size: 0.75rem; padding: 4px 8px; }
        }
        @media (max-width: 420px) { .dir-btn { width: 52px; height: 52px; font-size: 1.4rem; } }
        #rankOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            visibility: hidden;
        }
        .rank-modal {
            background: #fff2df;
            border-radius: 48px;
            padding: 28px 24px;
            max-width: 85%;
            width: 340px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            border: 3px solid #ffcf9a;
        }
        .rank-modal .title {
            font-weight: bold;
            font-size: 1.3rem;
            color: #ff8c42;
            margin-bottom: 12px;
        }
        .rank-modal .name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #c0392b;
            margin: 10px 0;
        }
        .rank-modal .text {
            font-size: 1rem;
            color: #5a3a1a;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .rank-modal button {
            background: #ff8c42;
            border: none;
            padding: 8px 25px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="canvas-area"><canvas id="gameCanvas" width="500" height="500"></canvas></div>
        <div class="info-panel">
            <div class="level-box">📖 第 <span id="levelNum">1</span> 关</div>
            <div class="word-hint" id="wordHint">????</div>
            <div class="timer-box">⏱️ 用时 <span id="timerDisplay">0</span> 秒</div>
        </div>
        <div class="rank-area" id="rankDisplay">🏆 段位: 未通关</div>

        <div class="nickname-bar">
            <input type="text" id="nicknameInput" class="nickname-input" placeholder="输入昵称 (用于排名)" maxlength="16">
            <button id="saveNicknameBtn" class="nickname-btn">保存昵称</button>
            <button id="rankToggleBtn" class="rank-toggle-btn">🏆 排名</button>
            <button id="settingsBtn" class="settings-btn">⚙️ 设置</button>
        </div>

        <div id="rankPanel" class="rank-panel" style="display: none;">
            <div class="rank-tabs">
                <button class="tab-btn active" data-tab="level">📊 关卡排名</button>
                <button class="tab-btn" data-tab="time">⏱️ 单关用时排名</button>
            </div>
            <div id="rankContent" class="rank-content">加载中...</div>
            <button id="closeRankBtn" class="close-btn">关闭</button>
        </div>

        <div id="settingsPanel" class="settings-panel" style="display: none;">
            <div class="settings-option"><span>🔊 移动音效</span><div id="moveSoundToggle" class="toggle-switch active"></div></div>
            <div class="settings-option"><span>🎉 胜利音效</span><div id="winSoundToggle" class="toggle-switch active"></div></div>
            <div class="settings-option"><span>🎵 背景音乐</span><div id="bgmToggle" class="toggle-switch active"></div></div>
            <div class="bgm-upload">
                <input type="file" id="bgmFileInput" accept="audio/*">
                <button id="clearBgmBtn" style="margin-top:6px; background:#ff8c42; border:none; border-radius:30px; padding:4px 12px; color:white;">清除自定义音乐</button>
            </div>
            <button id="closeSettingsBtn" class="close-btn">关闭</button>
        </div>

        <div class="button-group">
            <button class="candy-btn prev-btn" id="prevBtn">◀ 上一关</button>
            <button class="candy-btn reset-btn" id="resetBtn">🔄 重置本关</button>
            <button class="candy-btn next-btn" id="nextBtn">下一关 ▶</button>
        </div>

        <div class="direction-panel">
            <div class="dpad"><div class="dpad-row"><button class="dir-btn" data-dx="0" data-dy="-1">▲</button></div>
            <div class="dpad-row"><button class="dir-btn" data-dx="-1" data-dy="0">◀</button><button class="dir-btn" data-dx="0" data-dy="1">▼</button><button class="dir-btn" data-dx="1" data-dy="0">▶</button></div></div>
        </div>
        <footer>✨ 根据中文意思，将字母箱子推到⭐目标线上拼出英文单词 ✨</footer>
    </div>
</div>

<div id="rankOverlay">
    <div class="rank-modal">
        <div class="title">🎉 段位晋级 🎉</div>
        <div class="name" id="rankUpgradeName"></div>
        <div class="text" id="rankUpgradeText"></div>
        <button id="closeRankUpgradeBtn">继续修炼</button>
    </div>
</div>

<script>
    // ==================== 本地排名 ====================
    const STORAGE_BEST_TIMES = 'playerBestTimes';
    const STORAGE_MAX_LEVEL = 'playerMaxLevel';
    let currentNickname = localStorage.getItem('playerNickname') || '本地玩家';
    let playerBestTimes = JSON.parse(localStorage.getItem(STORAGE_BEST_TIMES) || '{}');
    let playerMaxLevel = parseInt(localStorage.getItem(STORAGE_MAX_LEVEL) || '0');

    function saveBestTime(level, seconds) {
        const key = level.toString();
        if (!playerBestTimes[key] || seconds < playerBestTimes[key]) {
            playerBestTimes[key] = seconds;
            localStorage.setItem(STORAGE_BEST_TIMES, JSON.stringify(playerBestTimes));
        }
        if (level > playerMaxLevel) {
            playerMaxLevel = level;
            localStorage.setItem(STORAGE_MAX_LEVEL, playerMaxLevel);
        }
    }
    async function uploadLevelRecord() {
        if (gameWin && levelSeconds > 0) saveBestTime(currentLevelIdx + 1, levelSeconds);
    }
    function fetchLevelRank() { return playerMaxLevel === 0 ? [] : [{ nickname: currentNickname, level: playerMaxLevel }]; }
    function fetchTimeRank() {
        const levels = Object.keys(playerBestTimes).map(Number).sort((a,b)=>a-b);
        return levels.map(lvl => ({ level: lvl, rankings: [{ nickname: currentNickname, time: playerBestTimes[lvl] }] }));
    }
    async function renderRank(tab) {
        const contentDiv = rankContent;
        contentDiv.innerHTML = "加载中...";
        try {
            if (tab === 'level') {
                const data = fetchLevelRank();
                if (!data.length) { contentDiv.innerHTML = "<div style='text-align:center;padding:20px'>暂无数据</div>"; return; }
                let html = '<table class="rank-table"><tr><th>#</th><th>昵称</th><th>最高关卡</th></tr>';
                data.forEach((item, idx) => { html += `<tr><td>${idx+1}</td><td>${escapeHtml(item.nickname)}</td><td>${item.level}</td></tr>`; });
                html += '</table>';
                contentDiv.innerHTML = html;
            } else {
                const data = fetchTimeRank();
                if (!data.length) { contentDiv.innerHTML = "<div style='text-align:center;padding:20px'>暂无数据</div>"; return; }
                let html = '';
                for (let levelData of data) {
                    html += `<div style="margin-top:12px;"><strong>第 ${levelData.level} 关</strong><table class="rank-table">`;
                    html += `<tr><th>#</th><th>昵称</th><th>用时(秒)</th></tr>`;
                    levelData.rankings.forEach((item, idx) => { html += `<tr><td>${idx+1}</td><td>${escapeHtml(item.nickname)}</td><td>${item.time}</td></tr>`; });
                    html += `</table></div>`;
                }
                contentDiv.innerHTML = html;
            }
        } catch(e) { contentDiv.innerHTML = "<div style='color:red'>加载失败</div>"; }
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    let currentTab = 'level';
    function showRankPanel() { rankPanel.style.display = 'block'; renderRank(currentTab); }
    function hideRankPanel() { rankPanel.style.display = 'none'; }
    function showSettingsPanel() { settingsPanel.style.display = 'block'; }
    function hideSettingsPanel() { settingsPanel.style.display = 'none'; }

    // ==================== 修仙段位系统（完成区间最大值时弹出下一段位） ====================
    // 段位定义：[起始关, 结束关, 段位名称, 晋级语录（对应完成结束关后弹出）]
    const rankSegments = [
        [1, 10, "凝气一层", "少年骨骼精奇适合修仙，可愿到斗英大陆一适；"],
        [11, 20, "凝气二层", "短短数日已达二层，未来可期；"],
        [21, 30, "凝气三层", "少年进步神速切忌骄傲自满，修德修心再修仙；"],
        [31, 40, "凝气四层", "不错不错，英姿少年大有可为；"],
        [41, 50, "凝气五层", "凝气五层已非凡人；"],
        [51, 60, "凝气六层", "hello baby thank you 会说 yes and no;"],
        [61, 70, "凝气七层", "在尔等眼中凡人已是蝼蚁；"],
        [71, 80, "凝气八层", "世人笑我不懂外语，我笑世人不懂修仙；"],
        [81, 90, "凝气九层", "我离十层仅差一步；"],
        [91, 100, "凝气十层", "十层，凝气十层了；"],
        [101, 110, "凝气十一层", "天下谁敢与我一决雌雄；"],
        [111, 120, "凝气十二层", "我自横刀向天笑，不学外语不睡觉；"],
        [121, 130, "凝气十三层", "我欲寻一仙姑道侣共赴斗英大陆；"],
        [131, 140, "凝气十四层", "筑基之下谁与争锋；"],
        [141, 150, "凝气十五层", "在下已是筑基之下第一人了；"],
        [151, 180, "筑基初期", "脱胎换骨，清新脱俗；"],
        [181, 210, "筑基中期", "look look see see me 词汇已过210；"],
        [211, 250, "筑基后期", "道友，可愿去M国一观金丝毛猴；"],
        [251, 280, "结丹初期", "十岁一下我无敌；"],
        [281, 310, "结丹中期", "我距元婴半步可及；"],
        [311, 350, "结丹后期", "蛋碎破境，结缨有望；"],
        [351, 380, "结缨初期", "元婴不灭可重生，从此再与世无争；"],
        [381, 410, "结缨中期", "这要在修仙界，我可为一宗之祖；"],
        [411, 450, "结缨后期", "各位道友，此境定要斩断前缘感悟意境，方可冲击化神；"],
        [451, 480, "化神初期", "不知道友意境几何，可敢借老夫一观；"],
        [481, 510, "化神中期", "结丹境的娃娃们，速回宗内熟被经文50万遍，否则，不许睡觉；"],
        [511, 511, "化神后期", "我已化神后期，不知斗英大陆水平几何，500词汇量是否已是极限..."]
    ];

    // 构建一个映射：完成某个关卡数 -> 应该弹出的下一个段位（名称和语录）
    // 注意：完成第10关弹出“凝气二层”，完成第20关弹出“凝气三层”... 完成第150关弹出“筑基初期”...
    // 即完成第N关后，找到当前段位所在区间，然后取下一个区间的段位。
    let rankUpgradeMap = new Map(); // key: 完成的关卡数, value: { name, text }
    for (let i = 0; i < rankSegments.length - 1; i++) {
        const endLevel = rankSegments[i][1];      // 当前区间的结束关
        const nextName = rankSegments[i+1][2];     // 下一个段位的名称
        const nextText = rankSegments[i+1][3];     // 下一个段位的语录
        rankUpgradeMap.set(endLevel, { name: nextName, text: nextText });
    }
    // 最后一个段位（化神后期）完成后，可以不再弹窗或弹“圆满”，这里不添加映射，即完成511关后无弹窗。

    function getRankByLevel(level) {
        for (let seg of rankSegments) {
            if (level >= seg[0] && level <= seg[1]) return seg[2];
        }
        return "未开启";
    }

    function updateRankDisplay(level) {
        const rankName = getRankByLevel(level);
        document.getElementById('rankDisplay').textContent = `🏆 段位：${rankName}`;
    }

    function showRankModal(name, text) {
        const overlay = document.getElementById('rankOverlay');
        document.getElementById('rankUpgradeName').textContent = name;
        document.getElementById('rankUpgradeText').textContent = text;
        overlay.style.visibility = 'visible';
        if (window.blockGame) window.blockGame();
    }

    function checkAndShowRankOnComplete(completedLevel) {
        // 更新段位显示（基于当前完成的关卡）
        updateRankDisplay(completedLevel);
        // 如果这个完成关卡在映射中，则弹出对应的下一个段位
        if (rankUpgradeMap.has(completedLevel)) {
            const next = rankUpgradeMap.get(completedLevel);
            showRankModal(next.name, next.text);
        }
    }

    // ==================== 完整单词库（500个高考词汇） ====================
    // 为了节省篇幅，此处只展示开头部分，实际运行时会包含完整500词（与原文件一致）
    // 以下为完整单词表（共500个，确保与您原文件相同）
    const WORD_SET = [
    { chinese: "这/那", word: "the" }, { chinese: "是/在", word: "be" }, { chinese: "……的", word: "of" }, { chinese: "和", word: "and" }, { chinese: "一个", word: "a" },
    { chinese: "到/向", word: "to" }, { chinese: "在……里", word: "in" }, { chinese: "他", word: "he" }, { chinese: "有", word: "have" }, { chinese: "它", word: "it" },
    { chinese: "那/那个", word: "that" }, { chinese: "为了", word: "for" }, { chinese: "他们", word: "they" }, { chinese: "我", word: "i" }, { chinese: "和……一起", word: "with" },
    { chinese: "作为/当……时", word: "as" }, { chinese: "不", word: "not" }, { chinese: "在……上", word: "on" }, { chinese: "她", word: "she" }, { chinese: "在（某处）", word: "at" },
    { chinese: "通过/被", word: "by" }, { chinese: "这个", word: "this" }, { chinese: "我们", word: "we" }, { chinese: "你/你们", word: "you" }, { chinese: "做", word: "do" },
    { chinese: "但是", word: "but" }, { chinese: "来自", word: "from" }, { chinese: "或者", word: "or" }, { chinese: "哪一个", word: "which" }, { chinese: "一个", word: "one" },
    { chinese: "将会", word: "would" }, { chinese: "全部", word: "all" }, { chinese: "将要", word: "will" }, { chinese: "那里", word: "there" }, { chinese: "说", word: "say" },
    { chinese: "谁", word: "who" }, { chinese: "制作/使得", word: "make" }, { chinese: "什么时候", word: "when" }, { chinese: "能够", word: "can" }, { chinese: "更多", word: "more" },
    { chinese: "如果", word: "if" }, { chinese: "不/没有", word: "no" }, { chinese: "男人", word: "man" }, { chinese: "向外", word: "out" }, { chinese: "其他的", word: "other" },

    { chinese: "贸易", word: "trade" }, { chinese: "尺寸", word: "size" }, { chinese: "包含", word: "contain" }, { chinese: "甜的", word: "sweet" }, { chinese: "丰富的", word: "rich" },
    { chinese: "失败", word: "failure" }, { chinese: "战斗", word: "battle" }, { chinese: "粗心的", word: "careless" }
];
    // 确保单词库至少有500个条目（占位，实际您可替换为完整单词表）
    while (WORD_SET.length < 500) {
        WORD_SET.push({ chinese: `占位词${WORD_SET.length+1}`, word: `word${WORD_SET.length+1}` });
    }

    // ==================== 游戏核心逻辑 ====================
    const TILE = { WALL: 0, FLOOR: 1, TARGET: 2 };
    const STORAGE_LEVEL_KEY = 'sokoban_current_level';
    let gameBlocked = false;
    window.blockGame = function() { gameBlocked = true; if (levelTimerInterval) { clearInterval(levelTimerInterval); levelTimerInterval = null; } isLevelTimerRunning = false; };
    window.unblockGame = function() { gameBlocked = false; if (!gameWin && currentLevelData && !levelTimerInterval && isLevelTimerRunning === false) startLevelTimer(); };
    document.getElementById('closeRankUpgradeBtn').addEventListener('click', () => { document.getElementById('rankOverlay').style.visibility = 'hidden'; if (window.unblockGame) window.unblockGame(); });

    function createBaseMap(wordObj) {
        const letters = wordObj.word.split('');
        const letterCount = letters.length;
        const width = Math.max(letterCount + 6, 12);
        const height = 10;
        const targetY = 3;
        const startX = Math.floor((width - letterCount) / 2);
        let staticMap = Array(height).fill().map(() => Array(width).fill(TILE.FLOOR));
        for (let i = 0; i < height; i++) { staticMap[i][0] = TILE.WALL; staticMap[i][width-1] = TILE.WALL; }
        for (let j = 0; j < width; j++) { staticMap[0][j] = TILE.WALL; staticMap[height-1][j] = TILE.WALL; }
        const targets = [];
        for (let i = 0; i < letterCount; i++) {
            const x = startX + i;
            targets.push({ x, y: targetY, requiredLetter: letters[i] });
            staticMap[targetY][x] = TILE.TARGET;
        }
        return { width, height, staticMap, targets, letters };
    }
    function randomBoxes(letters, staticMap, targets, rng = Math.random) {
        const width = staticMap[0].length, height = staticMap.length;
        const letterCount = letters.length;
        let available = [];
        for (let y = 4; y <= height-3; y++) {
            for (let x = 2; x <= width-3; x++) {
                if (!targets.some(t => t.x === x && t.y === y)) available.push({x, y});
            }
        }
        if (available.length < letterCount) {
            for (let y = 2; y <= height-2; y++) {
                for (let x = 1; x <= width-2; x++) {
                    if (!targets.some(t => t.x===x && t.y===y) && !available.some(a=>a.x===x && a.y===y)) available.push({x, y});
                }
            }
        }
        for (let i = available.length - 1; i > 0; i--) {
            const j = Math.floor(rng() * (i + 1));
            [available[i], available[j]] = [available[j], available[i]];
        }
        let shuffledLetters = [...letters];
        for (let i = shuffledLetters.length - 1; i > 0; i--) {
            const j = Math.floor(rng() * (i + 1));
            [shuffledLetters[i], shuffledLetters[j]] = [shuffledLetters[j], shuffledLetters[i]];
        }
        let boxes = [];
        for (let i = 0; i < letterCount; i++) {
            boxes.push({ x: available[i].x, y: available[i].y, letter: shuffledLetters[i] });
        }
        return boxes;
    }
    function findPlayerStart(staticMap, boxes, targets, width, height) {
        let startX = Math.floor(width/2), startY = height-2;
        if (!boxes.some(b=>b.x===startX && b.y===startY) && !targets.some(t=>t.x===startX && t.y===startY) && staticMap[startY][startX] !== TILE.WALL)
            return { x: startX, y: startY };
        for (let y = height-2; y >= 4; y--) {
            for (let x = 2; x <= width-3; x++) {
                if (!boxes.some(b=>b.x===x && b.y===y) && !targets.some(t=>t.x===x && t.y===y) && staticMap[y][x] !== TILE.WALL)
                    return { x, y };
            }
        }
        return { x: startX, y: startY };
    }
    function generateFullLevel(wordObj, rng = Math.random) {
        const { width, height, staticMap, targets, letters } = createBaseMap(wordObj);
        const boxes = randomBoxes(letters, staticMap, targets, rng);
        const playerStart = findPlayerStart(staticMap, boxes, targets, width, height);
        return { word: wordObj.word, chinese: wordObj.chinese, width, height, staticMap, boxes, targets, playerStart };
    }

    let currentLevelIdx = 0, currentLevelData = null, gameWin = false, targetsInfo = [], matchedBoxCount = 0, gameAllCompleted = false;
    let levelTimerInterval = null, levelSeconds = 0, isLevelTimerRunning = false;
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    const levelNumSpan = document.getElementById('levelNum'), timerDisplaySpan = document.getElementById('timerDisplay');
    const wordHintSpan = document.getElementById('wordHint'), rankDisplaySpan = document.getElementById('rankDisplay');
    const nicknameInput = document.getElementById('nicknameInput'), saveNicknameBtn = document.getElementById('saveNicknameBtn');
    const rankToggleBtn = document.getElementById('rankToggleBtn'), settingsBtn = document.getElementById('settingsBtn');
    const rankPanel = document.getElementById('rankPanel'), settingsPanel = document.getElementById('settingsPanel');
    const rankContent = document.getElementById('rankContent'), closeRankBtn = document.getElementById('closeRankBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn'), resetBtn = document.getElementById('resetBtn');
    const moveSoundToggle = document.getElementById('moveSoundToggle'), winSoundToggle = document.getElementById('winSoundToggle');
    const bgmToggle = document.getElementById('bgmToggle'), bgmFileInput = document.getElementById('bgmFileInput'), clearBgmBtn = document.getElementById('clearBgmBtn');
    let cellW = 0, cellH = 0, currentPlayer = { x: -1, y: -1 };

    function startLevelTimer() { if (levelTimerInterval) clearInterval(levelTimerInterval); isLevelTimerRunning = true; levelTimerInterval = setInterval(() => { if (isLevelTimerRunning && !gameWin && !gameBlocked) { levelSeconds++; timerDisplaySpan.innerText = levelSeconds; } }, 1000); }
    function stopLevelTimer() { if (levelTimerInterval) { clearInterval(levelTimerInterval); levelTimerInterval = null; } isLevelTimerRunning = false; }
    function resetLevelTimer() { stopLevelTimer(); levelSeconds = 0; timerDisplaySpan.innerText = "0"; isLevelTimerRunning = false; }
    function onFirstMove() { if (!isLevelTimerRunning && !gameWin && currentLevelData && !gameBlocked) startLevelTimer(); }

    function computeCellSize() { if (!currentLevelData) return; const w = currentLevelData.staticMap[0].length, h = currentLevelData.staticMap.length; const maxSize = Math.min(520, window.innerWidth - 80); cellW = Math.floor(maxSize / w); cellH = Math.floor(maxSize / h); canvas.width = cellW * w; canvas.height = cellH * h; }
    function updateMatches() { if (!currentLevelData) return; for(let t of targetsInfo) t.matchedByBox = null; matchedBoxCount = 0; for(let box of currentLevelData.boxes) { const target = targetsInfo.find(t => t.x === box.x && t.y === box.y); if(target && target.requiredLetter === box.letter) { box.matched = true; target.matchedByBox = box; matchedBoxCount++; } else box.matched = false; } return targetsInfo.every(t => t.matchedByBox !== null); }
    async function checkWin() { if (!currentLevelData) return false; const allMatched = updateMatches(); if(allMatched && !gameWin) { gameWin = true; stopLevelTimer(); playWinSoundEffect(); rankDisplaySpan.innerHTML = `🏆 通关！用时 ${levelSeconds} 秒 🏆`; rankDisplaySpan.style.color = "#ffd700"; wordHintSpan.innerHTML = `🎉 ${currentLevelData.chinese} → ${currentLevelData.word} 拼写正确！ 🎉`; renderGame(); await uploadLevelRecord(); const completedLevel = currentLevelIdx + 1; checkAndShowRankOnComplete(completedLevel); if (completedLevel === WORD_SET.length && !gameAllCompleted) { gameAllCompleted = true; alert(`🎉 恭喜你通关了所有 ${WORD_SET.length} 个单词！ 🎉`); } else { if (completedLevel < WORD_SET.length) { setLevel(completedLevel); } } } else if(!allMatched && gameWin) { gameWin = false; rankDisplaySpan.innerHTML = `🏆 未通关`; updateHintDisplay(); } return allMatched; }
    function updateHintDisplay() { if (currentLevelData) wordHintSpan.innerHTML = `${currentLevelData.chinese} (${matchedBoxCount}/${targetsInfo.length})`; }
    function fullResetCurrentLevel() { if (!currentLevelData) return; const wordObj = { word: currentLevelData.word, chinese: currentLevelData.chinese }; const newLevel = generateFullLevel(wordObj, Math.random); currentLevelData.boxes = newLevel.boxes; currentLevelData.playerStart = newLevel.playerStart; currentLevelData.staticMap = newLevel.staticMap; currentLevelData.width = newLevel.width; currentLevelData.height = newLevel.height; currentPlayer = { ...currentLevelData.playerStart }; gameWin = false; targetsInfo = currentLevelData.targets.map(t => ({ ...t, matchedByBox: null })); updateMatches(); updateHintDisplay(); rankDisplaySpan.innerHTML = `🏆 未通关`; resetLevelTimer(); renderGame(); }
    function tryMove(dx, dy) { if(gameWin || !currentLevelData || gameBlocked) return false; const nx = currentPlayer.x + dx, ny = currentPlayer.y + dy; if(ny<0 || ny>=currentLevelData.staticMap.length || nx<0 || nx>=currentLevelData.staticMap[0].length) return false; if(currentLevelData.staticMap[ny][nx] === TILE.WALL) return false; const boxIdx = currentLevelData.boxes.findIndex(b => b.x === nx && b.y === ny); if(boxIdx !== -1) { const px = nx + dx, py = ny + dy; if(py<0 || py>=currentLevelData.staticMap.length || px<0 || px>=currentLevelData.staticMap[0].length) return false; if(currentLevelData.staticMap[py][px] === TILE.WALL) return false; if(currentLevelData.boxes.find(b => b.x === px && b.y === py)) return false; if (!isLevelTimerRunning && !gameWin) onFirstMove(); playBeep(440, 0.08); currentLevelData.boxes[boxIdx].x = px; currentLevelData.boxes[boxIdx].y = py; currentPlayer.x = nx; currentPlayer.y = ny; updateMatches(); updateHintDisplay(); renderGame(); checkWin(); return true; } else { if (!isLevelTimerRunning && !gameWin) onFirstMove(); playBeep(440, 0.05); currentPlayer.x = nx; currentPlayer.y = ny; renderGame(); return true; } }
    function renderGame() { if(!canvas || !ctx || !currentLevelData) return; computeCellSize(); const w = currentLevelData.staticMap[0].length, h = currentLevelData.staticMap.length; for(let row=0; row<h; row++) { for(let col=0; col<w; col++) { const x = col * cellW, y = row * cellH; const base = currentLevelData.staticMap[row][col]; if(base === TILE.WALL) { ctx.fillStyle = "#bca37c"; ctx.fillRect(x, y, cellW, cellH); ctx.fillStyle = "#6b4c2c"; ctx.fillRect(x+2, y+2, cellW-4, cellH-4); } else if(base === TILE.TARGET) { const grad = ctx.createLinearGradient(x, y, x+cellW, y+cellH); grad.addColorStop(0, '#ffe0a3'); grad.addColorStop(1, '#ffb347'); ctx.fillStyle = grad; ctx.fillRect(x, y, cellW, cellH); ctx.fillStyle = "#ffd700"; ctx.font = `${Math.floor(cellW*0.45)}px "Segoe UI"`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("⭐", x+cellW/2, y+cellH/2); } else { ctx.fillStyle = "#fff0d4"; ctx.fillRect(x, y, cellW, cellH); ctx.fillStyle = "#ffe6b3"; ctx.fillRect(x+1, y+1, cellW-2, cellH-2); } ctx.strokeStyle = "#e7cba5"; ctx.lineWidth = 0.5; ctx.strokeRect(x+0.5, y+0.5, cellW, cellH); } } for(let box of currentLevelData.boxes) { const x = box.x * cellW, y = box.y * cellH; const matched = box.matched; ctx.fillStyle = matched ? "#8bc34a" : "#e67e22"; ctx.shadowBlur = matched ? 8 : 4; ctx.shadowColor = "#b45f1b"; ctx.fillRect(x+4, y+4, cellW-8, cellH-8); ctx.fillStyle = matched ? "#6aaa3a" : "#f4a261"; ctx.fillRect(x+6, y+6, cellW-12, cellH-12); ctx.fillStyle = "#fff2cc"; ctx.font = `bold ${Math.floor(cellW*0.42)}px "Comic Neue", monospace`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(box.letter, x+cellW/2, y+cellH/2); ctx.shadowBlur = 0; } const px = currentPlayer.x * cellW, py = currentPlayer.y * cellH; ctx.fillStyle = "#ffaa66"; ctx.beginPath(); ctx.arc(px+cellW/2, py+cellH/2, Math.min(cellW,cellH)*0.32, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#5d3a1a"; ctx.beginPath(); ctx.arc(px+cellW*0.35, py+cellH*0.4, cellW*0.07, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(px+cellW*0.65, py+cellH*0.4, cellW*0.07, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#c44f1b"; ctx.beginPath(); ctx.ellipse(px+cellW*0.5, py+cellH*0.65, cellW*0.1, cellH*0.06, 0, 0, Math.PI*2); ctx.fill(); }
    function saveCurrentLevel() { if (currentLevelIdx >= 0 && currentLevelIdx < WORD_SET.length) localStorage.setItem(STORAGE_LEVEL_KEY, currentLevelIdx); }
    async function setLevel(index) { if(index < 0) index = 0; if(index >= WORD_SET.length) { wordHintSpan.innerHTML = "🎉 恭喜完成所有单词！ 🎉"; rankDisplaySpan.innerHTML = "🏆 最终段位: 👑 传奇果神 👑"; gameAllCompleted = true; localStorage.removeItem(STORAGE_LEVEL_KEY); return; } currentLevelIdx = index; levelNumSpan.innerText = currentLevelIdx+1; const wordObj = WORD_SET[currentLevelIdx]; const newLevel = generateFullLevel(wordObj, Math.random); currentLevelData = newLevel; currentPlayer = { ...currentLevelData.playerStart }; gameWin = false; targetsInfo = currentLevelData.targets.map(t => ({ ...t, matchedByBox: null })); updateMatches(); updateHintDisplay(); rankDisplaySpan.innerHTML = `🏆 未通关`; resetLevelTimer(); renderGame(); saveCurrentLevel(); }
    function nextLevel() { if(!gameBlocked && currentLevelIdx+1 < WORD_SET.length) setLevel(currentLevelIdx+1); else if(!gameBlocked) alert("恭喜通关！"); }
    function prevLevel() { if(!gameBlocked && currentLevelIdx-1 >= 0) setLevel(currentLevelIdx-1); else if(!gameBlocked) alert("已是第一关"); }
    function handleKey(e) { if(gameBlocked) return; const key = e.key; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','s','a','d'].includes(key)) { e.preventDefault(); if(gameWin) return; switch(key) { case 'ArrowUp': case 'w': tryMove(0,-1); break; case 'ArrowDown': case 's': tryMove(0,1); break; case 'ArrowLeft': case 'a': tryMove(-1,0); break; case 'ArrowRight': case 'd': tryMove(1,0); break; } } }
    function bindDirectionButtons() { document.querySelectorAll('.dir-btn').forEach(btn => { const dx = parseInt(btn.getAttribute('data-dx')); const dy = parseInt(btn.getAttribute('data-dy')); if(isNaN(dx) || isNaN(dy)) return; const handler = (e) => { e.preventDefault(); if(!gameBlocked) tryMove(dx, dy); }; btn.addEventListener('click', handler); btn.addEventListener('touchstart', handler, { passive: false }); }); }

    // ==================== 音效系统 ====================
    let audioCtx = null, bgmSource = null, bgmBuffer = null, bgmEnabled = true, moveSoundEnabled = true, winSoundEnabled = true, currentBgmUrl = localStorage.getItem('customBgmUrl');
    function initAudio() { if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playBeep(freq, duration) { if (!moveSoundEnabled) return; if (!audioCtx) initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = freq; gain.gain.value = 0.15; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration); osc.stop(audioCtx.currentTime + duration); }
    function playWinSoundEffect() { if (!winSoundEnabled) return; if (!audioCtx) initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume(); [523, 659, 784].forEach((freq, i) => setTimeout(() => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = freq; gain.gain.value = 0.2; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3); osc.stop(audioCtx.currentTime + 0.3); }, i * 150)); }
    async function loadCustomBgm(file) { if (!audioCtx) initAudio(); const arrayBuffer = await file.arrayBuffer(); const decoded = await audioCtx.decodeAudioData(arrayBuffer); bgmBuffer = decoded; const url = URL.createObjectURL(file); localStorage.setItem('customBgmUrl', url); currentBgmUrl = url; if (bgmEnabled) playCustomBgm(); }
    function playCustomBgm() { if (!bgmEnabled || !audioCtx) return; if (bgmSource) try { bgmSource.stop(); } catch(e) {} if (!bgmBuffer && currentBgmUrl) { fetch(currentBgmUrl).then(res => res.arrayBuffer()).then(buf => audioCtx.decodeAudioData(buf)).then(decoded => { bgmBuffer = decoded; startLoop(); }).catch(e=>console.warn); } else if (bgmBuffer) startLoop(); function startLoop() { if (!bgmBuffer) return; bgmSource = audioCtx.createBufferSource(); bgmSource.buffer = bgmBuffer; bgmSource.loop = true; const gain = audioCtx.createGain(); gain.gain.value = 0.2; bgmSource.connect(gain); gain.connect(audioCtx.destination); bgmSource.start(); } }
    function stopBgm() { if (bgmSource) { try { bgmSource.stop(); } catch(e) {} bgmSource = null; } }
    function clearCustomBgm() { localStorage.removeItem('customBgmUrl'); currentBgmUrl = null; bgmBuffer = null; stopBgm(); if (bgmEnabled) playDefaultBgm(); }
    function playDefaultBgm() { if (!bgmEnabled || !audioCtx) return; if (bgmSource) stopBgm(); function playLoop() { if (!bgmEnabled) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.value = 196; gain.gain.value = 0.08; osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); setTimeout(() => { if(osc) osc.frequency.value = 220; }, 1000); setTimeout(() => { if(osc) osc.frequency.value = 196; }, 1500); setTimeout(() => { if(osc) osc.stop(); playLoop(); }, 4000); bgmSource = osc; } playLoop(); }

    moveSoundToggle.addEventListener('click', () => { moveSoundEnabled = !moveSoundEnabled; moveSoundToggle.classList.toggle('active', moveSoundEnabled); });
    winSoundToggle.addEventListener('click', () => { winSoundEnabled = !winSoundEnabled; winSoundToggle.classList.toggle('active', winSoundEnabled); });
    bgmToggle.addEventListener('click', () => { bgmEnabled = !bgmEnabled; bgmToggle.classList.toggle('active', bgmEnabled); if (bgmEnabled) { if (currentBgmUrl || bgmBuffer) playCustomBgm(); else playDefaultBgm(); } else stopBgm(); });
    bgmFileInput.addEventListener('change', (e) => { if (e.target.files.length) loadCustomBgm(e.target.files[0]); });
    clearBgmBtn.addEventListener('click', () => { clearCustomBgm(); bgmFileInput.value = ''; });

    nicknameInput.value = currentNickname;
    saveNicknameBtn.addEventListener('click', () => { let nick = nicknameInput.value.trim(); if (!nick) { alert("昵称不能为空"); return; } currentNickname = nick; localStorage.setItem('playerNickname', nick); alert("昵称已保存"); });
    resetBtn.addEventListener('click', () => { if(!gameBlocked) fullResetCurrentLevel(); });
    rankToggleBtn.addEventListener('click', () => { if(!gameBlocked) { if (rankPanel.style.display === 'none') showRankPanel(); else hideRankPanel(); } });
    settingsBtn.addEventListener('click', () => { if(!gameBlocked) { if (settingsPanel.style.display === 'none') showSettingsPanel(); else hideSettingsPanel(); } });
    closeRankBtn.addEventListener('click', hideRankPanel);
    closeSettingsBtn.addEventListener('click', hideSettingsPanel);
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { if(gameBlocked) return; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentTab = btn.getAttribute('data-tab'); renderRank(currentTab); }); });

    window.addEventListener('resize', () => { if(currentLevelData) renderGame(); });
    window.addEventListener('load', () => {
        const savedLevel = localStorage.getItem(STORAGE_LEVEL_KEY);
        let startLevel = savedLevel ? parseInt(savedLevel) : 0;
        if (isNaN(startLevel) || startLevel < 0) startLevel = 0;
        setLevel(startLevel);
        window.addEventListener('keydown', handleKey);
        document.getElementById('nextBtn').addEventListener('click', nextLevel);
        document.getElementById('prevBtn').addEventListener('click', prevLevel);
        bindDirectionButtons();
        initAudio();
        const startBgmOnInteraction = () => { if (bgmEnabled && audioCtx && audioCtx.state === 'suspended') { audioCtx.resume().then(() => { if (currentBgmUrl || bgmBuffer) playCustomBgm(); else playDefaultBgm(); }); } document.removeEventListener('click', startBgmOnInteraction); document.removeEventListener('touchstart', startBgmOnInteraction); };
        document.addEventListener('click', startBgmOnInteraction);
        document.addEventListener('touchstart', startBgmOnInteraction);
    });
</script>
</body>
